<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pyComputer Web Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0a0a0a;
      color: #00ff41;
      font-family: 'Fira Code', 'Consolas', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #header {
      background: linear-gradient(90deg, #0d1117 0%, #161b22 50%, #0d1117 100%);
      padding: 12px 20px;
      border-bottom: 1px solid #2d333b;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #header h1::before {
      content: "⬢";
      color: #00ff41;
    }
    #status {
      font-size: 12px;
      color: #8b949e;
    }
    #status.loading {
      color: #f0883e;
    }
    #status.ready {
      color: #3fb950;
    }
    #theme-buttons {
      display: flex;
      gap: 8px;
    }
    #theme-buttons button {
      background: transparent;
      border: 1px solid #30363d;
      color: #8b949e;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      border-radius: 4px;
      font-family: inherit;
    }
    #theme-buttons button:hover {
      border-color: #8b949e;
      color: #e6edf3;
    }
    #theme-buttons button.active {
      background: #21262d;
      border-color: #58a6ff;
      color: #58a6ff;
    }
    #terminal-container {
      flex: 1;
      padding: 10px;
      background: #0a0a0a;
    }
    #terminal {
      height: 100%;
    }
    .xterm {
      padding: 8px;
    }
    .xterm-viewport {
      background-color: transparent !important;
    }
  </style>
</head>
<body>
  <div id="header">
    <h1>pyComputer</h1>
    <div style="display: flex; align-items: center; gap: 20px;">
      <div id="theme-buttons">
        <button data-theme="auto" onclick="setTheme('auto')">Auto</button>
        <button data-theme="dark" onclick="setTheme('dark')">Dark</button>
        <button data-theme="light" onclick="setTheme('light')">Light</button>
      </div>
      <div id="status" class="loading">Loading Pyodide...</div>
    </div>
  </div>
  <div id="terminal-container">
    <div id="terminal"></div>
  </div>

  <script type="module" src="./main.js"></script>
  <script>
    const themes = {
      auto: { bg: "#0a0a0a", fg: "#00ff41", cursor: "#00ff41", selection: "rgba(0, 255, 65, 0.3)", header: "#0d1117", border: "#2d333b", btn: "#30363d", btnActive: "#21262d", accent: "#58a6ff", muted: "#8b949e" },
      dark: { bg: "#0a0a0a", fg: "#00ff41", cursor: "#00ff41", selection: "rgba(0, 255, 65, 0.3)", header: "#0d1117", border: "#2d333b", btn: "#30363d", btnActive: "#21262d", accent: "#58a6ff", muted: "#8b949e" },
      light: { bg: "#ffffff", fg: "#1a1a1a", cursor: "#1a1a1a", selection: "rgba(0, 0, 0, 0.2)", header: "#f0f0f0", border: "#d0d0d0", btn: "#e0e0e0", btnActive: "#d0d0d0", accent: "#0066cc", muted: "#666666" }
    };
    let currentTheme = 'auto';
    function setTheme(theme) {
      currentTheme = theme;
      const t = theme === 'auto' ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? themes.dark : themes.light) : themes[theme];
      document.querySelectorAll('#theme-buttons button').forEach(b => b.classList.remove('active'));
      document.querySelector(`#theme-buttons button[data-theme="${theme}"]`).classList.add('active');
      document.body.style.background = t.bg;
      document.body.style.color = t.fg;
      document.getElementById('header').style.background = `linear-gradient(90deg, ${t.header} 0%, ${t.header} 50%, ${t.header} 100%)`;
      document.getElementById('header').style.borderColor = t.border;
      if (window.term) {
        window.term.options.theme = { background: t.bg, foreground: t.fg, cursor: t.cursor, selection: t.selection };
        window.term.render();
      }
    }
    document.querySelector('#theme-buttons button[data-theme="auto"]').classList.add('active');
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => { if (currentTheme === 'auto') setTheme('auto'); });
    window.setTheme = setTheme;
  </script>
</body>
</html>
